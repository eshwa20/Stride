name: stride
description: Discipline and habit-building app powered by quests and streaks.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  fl_chart: ^0.66.0

  # ================= STATE MANAGEMENT =================
  provider: ^6.1.2

  # ================= UI / ANIMATION =================
  flutter_svg: ^2.0.10
  lottie: ^3.1.0

  # ================= FIREBASE =================
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1

  # ================= SOCIAL AUTH =================
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.0.1

  # ================= AUDIO & VIBRATION =================
  audioplayers: ^6.0.0
  vibration: ^2.0.0
  flutter_local_notifications: ^17.2.2

  # ================= UTILITIES =================
  intl: ^0.19.0

  # ================= STORAGE =================
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
    - assets/icons/
    - assets/icons/modes/
    - assets/illustrations/
    - assets/illustrations/modes/
    - assets/illustrations/onboarding/
    - assets/animations/
    - assets/ascension/
    - assets/sounds/
